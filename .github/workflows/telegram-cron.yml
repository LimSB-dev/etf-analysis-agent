name: Telegram Cron (15:00 KST)

on:
  schedule:
    # 15:00 KST == 06:00 UTC
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: telegram-cron
  cancel-in-progress: false

jobs:
  trigger:
    name: Trigger /api/telegram/cron
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.TELEGRAM_CRON_URL }}" ]; then
            echo "Missing secrets.TELEGRAM_CRON_URL"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing secrets.CRON_SECRET"
            exit 1
          fi

      - name: Call cron endpoint
        shell: bash
        run: |
          set -euo pipefail
          url="${{ secrets.TELEGRAM_CRON_URL }}"
          echo "Calling: ${url}"
          http_code="$(
            curl -sS -o /tmp/resp.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "User-Agent: github-actions-telegram-cron" \
              "${url}"
          )"
          echo "HTTP ${http_code}"
          cat /tmp/resp.json
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            exit 1
          fi

